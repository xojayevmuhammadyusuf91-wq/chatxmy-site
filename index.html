<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatXMY - Ultimate AI Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 1200px;
            height: 650px;
            display: flex;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-radius: 20px 0 0 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .sidebar h3 { color: #667eea; font-size: 16px; margin-bottom: 5px; }
        .mode-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        .mode-btn {
            padding: 10px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
        }
        .history-item {
            padding: 12px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            position: relative;
        }
        .history-item:hover { transform: translateX(5px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .history-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .save-btn {
            position: absolute;
            right: 8px;
            top: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .saved-items {
            max-height: 200px;
            overflow-y: auto;
        }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 0 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }
        .stat-item { text-align: center; }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .message.bot { align-self: flex-start; background: #f0f0f0; color: #333; }
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            font-size: 11px;
        }
        .action-btn {
            padding: 4px 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #667eea; color: white; }
        .file-preview {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            font-size: 13px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .tool-buttons {
            display: flex;
            gap: 8px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }
        .lang-selector {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            background: white;
        }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h3>🎯 Rejimlar</h3>
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="general">💬 Umumiy</button>
                <button class="mode-btn" data-mode="math">🔢 Matematika</button>
                <button class="mode-btn" data-mode="code">💻 Dasturlash</button>
                <button class="mode-btn" data-mode="english">🇬🇧 Ingliz tili</button>
            </div>
            
            <h3>📝 Tarix</h3>
            <div id="historyList" style="max-height: 200px; overflow-y: auto;"></div>
            
            <h3>⭐ Saqlangan</h3>
            <div id="savedList" class="saved-items"></div>
            
            <button onclick="clearAll()" style="background: #ff4444; margin-top: auto;">🗑️ Tozalash</button>
        </div>
        
        <div class="chat-area">
            <div class="header">
                <div>
                    <h1 id="chatTitle">🤖 ChatXMY Ultimate</h1>
                    <p style="font-size: 13px; opacity: 0.9;">AI + Internet + Fayl</p>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div style="font-size: 18px; font-weight: bold;" id="msgCount">0</div>
                        <div>Xabarlar</div>
                    </div>
                    <div class="stat-item">
                        <div style="font-size: 18px; font-weight: bold;" id="fileCount">0</div>
                        <div>Fayllar</div>
                    </div>
                </div>
            </div>
            
            <div class="messages" id="messages">
                <div class="message bot">
                    Salom! Men ChatXMY Ultimate versiyasi. 
                    <br>✅ Internet qidiruv
                    <br>✅ Fayl yuklash (PDF, DOCX, TXT)
                    <br>✅ Ko'p tillar
                    <br>✅ Maxsus rejimlar
                    <br><br>Qanday yordam bera olaman? 🌟
                </div>
            </div>
            
            <div class="input-area">
                <div class="tool-buttons">
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                    <input type="file" id="fileInput" accept=".pdf,.docx,.txt" style="display: none;" onchange="handleFileUpload(event)">
                    <button onclick="document.getElementById('imageInput').click()" style="padding: 12px; border-radius: 50%; font-size: 18px;" title="Rasm">📷</button>
                    <button onclick="document.getElementById('fileInput').click()" style="padding: 12px; border-radius: 50%; font-size: 18px;" title="Fayl">📁</button>
                    <button onclick="toggleSearchMode()" id="searchBtn" style="padding: 12px; border-radius: 50%; font-size: 18px; background: #4CAF50;" title="Internet">🔍</button>
                    <button onclick="startVoiceInput()" id="voiceBtn" style="padding: 12px; border-radius: 50%; font-size: 18px; background: #764ba2;" title="Ovoz">🎤</button>
                    <select class="lang-selector" id="langSelector">
                        <option value="uz">🇺🇿 O'zbek</option>
                        <option value="ru">🇷🇺 Русский</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="tr">🇹🇷 Türkçe</option>
                    </select>
                </div>
                <div class="input-row">
                    <input type="text" id="input" placeholder="Savolingizni yozing..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Yuborish</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        const TAVILY_API_KEY = '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';
        
        let history = [];
        let chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        let savedMessages = JSON.parse(localStorage.getItem('savedMessages') || '[]');
        let currentChatId = null;
        let searchMode = false;
        let currentMode = 'general';
        let currentFile = null;
        let stats = { messages: 0, files: 0 };
        
        // Mode configurations
        const modes = {
            general: { name: 'Umumiy', prompt: 'Sen ChatXMY. FAQAT O\'ZBEK tilida javob ber!' },
            math: { name: 'Matematika', prompt: 'Sen matematika o\'qituvchisi. Qadamma-qadam tushuntir. FAQAT O\'ZBEK tilida!' },
            code: { name: 'Dasturlash', prompt: 'Sen dasturlash mentori. Kod yoz va tushuntir. FAQAT O\'ZBEK tilida!' },
            english: { name: 'Ingliz tili', prompt: 'Sen ingliz tili o\'qituvchisi. Grammatika va so\'zlarni o\'rgat. FAQAT O\'ZBEK tilida tushuntir!' }
        };
        
        // Language prompts
        const langPrompts = {
            uz: 'FAQAT O\'ZBEK tilida javob ber!',
            ru: 'Отвечай ТОЛЬКО на РУССКОМ языке!',
            en: 'Answer ONLY in ENGLISH!',
            tr: 'SADECE TÜRKÇE cevap ver!'
        };
        
        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
                addMessage(`🎯 ${modes[currentMode].name} rejimi yoqildi!`, 'bot');
            });
        });
        
        function toggleSearchMode() {
            searchMode = !searchMode;
            const btn = document.getElementById('searchBtn');
            btn.style.background = searchMode ? '#FF6B6B' : '#4CAF50';
            addMessage(searchMode ? '🔍 Internet qidiruv yoqildi!' : '💬 Oddiy chat', 'bot');
        }
        
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            stats.files++;
            updateStats();
            
            const fileType = file.name.split('.').pop().toLowerCase();
            let fileContent = '';
            
            try {
                if (fileType === 'txt') {
                    fileContent = await file.text();
                } else if (fileType === 'pdf') {
                    fileContent = await extractPDFText(file);
                } else if (fileType === 'docx') {
                    fileContent = await extractDOCXText(file);
                }
                
                currentFile = { name: file.name, content: fileContent };
                const preview = document.createElement('div');
                preview.className = 'message user';
                preview.innerHTML = `<div class="file-preview">📁 ${file.name}<br><small>${fileContent.substring(0, 100)}...</small></div>`;
                document.getElementById('messages').appendChild(preview);
                addMessage(`Fayl yuklandi! Savol bering...`, 'bot');
            } catch (error) {
                addMessage(`❌ Fayl o'qishda xatolik: ${error.message}`, 'bot');
            }
        }
        
        async function extractPDFText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + '\n';
            }
            return text;
        }
        
        async function extractDOCXText(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer });
            return result.value;
        }
        
        function saveMessage(text) {
            const saved = { id: Date.now(), text, date: new Date().toLocaleString() };
            savedMessages.push(saved);
            localStorage.setItem('savedMessages', JSON.stringify(savedMessages));
            loadSaved();
            addMessage('💾 Saqlandi!', 'bot');
        }
        
        function loadSaved() {
            const list = document.getElementById('savedList');
            list.innerHTML = savedMessages.map(msg => 
                `<div class="history-item" onclick="showSaved(${msg.id})">
                    ${msg.text.substring(0, 30)}...
                    <br><small>${msg.date}</small>
                </div>`
            ).join('');
        }
        
        function shareMessage(text) {
            if (navigator.share) {
                navigator.share({ text });
            } else {
                navigator.clipboard.writeText(text);
                addMessage('📋 Nusxalandi!', 'bot');
            }
        }
        
        function updateStats() {
            document.getElementById('msgCount').textContent = stats.messages;
            document.getElementById('fileCount').textContent = stats.files;
        }
        
        async function searchInternet(query) {
            try {
                const response = await fetch('https://api.tavily.com/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: TAVILY_API_KEY,
                        query,
                        search_depth: 'basic',
                        max_results: 3
                    })
                });
                return await response.json();
            } catch (error) {
                return null;
            }
        }
        
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file || file.size > 20 * 1024 * 1024) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.createElement('div');
                preview.className = 'message user';
                preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; border-radius: 10px;">`;
                document.getElementById('messages').appendChild(preview);
            };
            reader.readAsDataURL(file);
        }
        
        let recognition = null;
        function startVoiceInput() {
            if (!('webkitSpeechRecognition' in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'uz-UZ';
            recognition.onresult = (e) => {
                document.getElementById('input').value = e.results[0][0].transcript;
                setTimeout(sendMessage, 500);
            };
            recognition.start();
        }
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            
            stats.messages++;
            updateStats();
            
            addMessage(message, 'user', true);
            input.value = '';
            
            const lang = document.getElementById('langSelector').value;
            let systemPrompt = modes[currentMode].prompt + ' ' + langPrompts[lang];
            let userPrompt = message;
            
            if (currentFile) {
                userPrompt = `Fayl: ${currentFile.name}\n\nMatn:\n${currentFile.content}\n\nSavol: ${message}`;
                currentFile = null;
            }
            
            if (searchMode) {
                const results = await searchInternet(message);
                if (results?.results) {
                    let context = 'Internet:\n';
                    results.results.forEach((r, i) => {
                        context += `${i+1}. ${r.title}: ${r.content}\n`;
                    });
                    userPrompt = context + '\nSavol: ' + message;
                }
            }
            
            try {
                const response = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: 'system', content: systemPrompt},
                            {role: 'user', content: userPrompt}
                        ]
                    })
                });
                const data = await response.json();
                if (data.answer) {
                    addMessage(data.answer, 'bot', true);
                }
            } catch (error) {
                addMessage('Xatolik: ' + error.message, 'bot');
            }
        }
        
        function addMessage(text, type, withActions = false) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = text;
            
            if (withActions && type === 'bot') {
                const actions = document.createElement('div');
                actions.className = 'message-actions';
                actions.innerHTML = `
                    <button class="action-btn" onclick="saveMessage('${text.replace(/'/g, "\\'")}')">💾 Saqlash</button>
                    <button class="action-btn" onclick="shareMessage('${text.replace(/'/g, "\\'")}')">🔗 Ulashish</button>
                `;
                div.appendChild(actions);
                      }
            
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
        }
        
        function clearAll() {
            if (confirm('Hammasini o\'chirish?')) {
                chatHistory = [];
                savedMessages = [];
                localStorage.clear();
                location.reload();
            }
        }
        
        loadSaved();
        updateStats();
    </script>
</body>
</html>
